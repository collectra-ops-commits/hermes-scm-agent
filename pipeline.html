<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLECTRA SCM COMMAND CENTRE - Pipeline</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>COLLECTRA SCM COMMAND CENTRE</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="freight_intel.html">Freight Intel</a></li>
                <li><a href="pipeline.html">Pipeline</a></li>
                <li><a href="incoterms.html">Incoterms</a></li>
                <li><a href="draft_desk.html">Draft Desk</a></li>
                <li><a href="memory_vault.html">Memory Vault</a></li>
                <li><a href="suppliers.html">Suppliers</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Pipeline Management (Kanban Board)</h2>
        <div class="kanban-board" id="kanban-board">
            <div class="kanban-column" data-column="vendor-id">
                <h3>Vendor ID</h3>
                <div class="kanban-cards" id="vendor-id-cards" ondragover="allowDrop(event)" ondrop="drop(event, 'vendor-id')"></div>
                <form class="kanban-add-card-form" onsubmit="addCard(event, 'vendor-id')">
                    <input type="text" placeholder="Add new card" required>
                    <button type="submit">Add</button>
                </form>
            </div>

            <div class="kanban-column" data-column="rfp-issued">
                <h3>RFP Issued</h3>
                <div class="kanban-cards" id="rfp-issued-cards" ondragover="allowDrop(event)" ondrop="drop(event, 'rfp-issued')"></div>
                <form class="kanban-add-card-form" onsubmit="addCard(event, 'rfp-issued')">
                    <input type="text" placeholder="Add new card" required>
                    <button type="submit">Add</button>
                </form>
            </div>

            <div class="kanban-column" data-column="negotiations">
                <h3>Negotiations</h3>
                <div class="kanban-cards" id="negotiations-cards" ondragover="allowDrop(event)" ondrop="drop(event, 'negotiations')"></div>
                <form class="kanban-add-card-form" onsubmit="addCard(event, 'negotiations')">
                    <input type="text" placeholder="Add new card" required>
                    <button type="submit">Add</button>
                </form>
            </div>

            <div class="kanban-column" data-column="contract-awarded">
                <h3>Contract Awarded</h3>
                <div class="kanban-cards" id="contract-awarded-cards" ondragover="allowDrop(event)" ondrop="drop(event, 'contract-awarded')"></div>
                <form class="kanban-add-card-form" onsubmit="addCard(event, 'contract-awarded')">
                    <input type="text" placeholder="Add new card" required>
                    <button type="submit">Add</button>
                </form>
            </div>

            <div class="kanban-column" data-column="in-transit">
                <h3>In Transit</h3>
                <div class="kanban-cards" id="in-transit-cards" ondragover="allowDrop(event)" ondrop="drop(event, 'in-transit')"></div>
                <form class="kanban-add-card-form" onsubmit="addCard(event, 'in-transit')">
                    <input type="text" placeholder="Add new card" required>
                    <button type="submit">Add</button>
                </form>
            </div>

            <div class="kanban-column" data-column="received">
                <h3>Received</h3>
                <div class="kanban-cards" id="received-cards" ondragover="allowDrop(event)" ondrop="drop(event, 'received')"></div>
                <form class="kanban-add-card-form" onsubmit="addCard(event, 'received')">
                    <input type="text" placeholder="Add new card" required>
                    <button type="submit">Add</button>
</form>
            </div>
        </div>
    </main>

    <script src="kanban.js"></script>
</body>
</html>
